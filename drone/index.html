<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stem Player</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            font-family: monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
        }
        #top-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        #top-bar h1 {
            font-size: 16px;
            margin: 0;
            white-space: nowrap;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 4px 12px;
            font-size: 12px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #status {
            font-size: 11px;
            color: #888;
        }
        #meter {
            width: 120px;
            height: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            margin-left: auto;
        }
        #controls {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 4px;
        }
        .stem-group {
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
            padding: 4px 8px;
        }
        .stem-name {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 2px;
        }
        .control {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 20px;
        }
        .control label {
            min-width: 32px;
            text-align: right;
            font-size: 10px;
            color: #777;
        }
        .control input[type="range"] {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
        .control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        .control input[type="range"]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        .control .value {
            min-width: 40px;
            font-size: 10px;
            color: #666;
            text-align: right;
        }
        .master-control {
            padding: 6px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <h1>Stem Player</h1>
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
        <span id="status">Click start</span>
        <canvas id="meter" width="120" height="16"></canvas>
    </div>
    <div id="controls"></div>

    <script type="module" src="drone.js"></script>
</body>
</html>
