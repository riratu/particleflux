<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dance</title>
    <link rel="stylesheet" href="/audio/style.css">
    <link rel="stylesheet" href="/audio/sliders.css">
    <style>
         body {
             margin: 0;
             overflow: hidden;
             background: #000;
         }
        canvas {
            display: block;
        }
        #fps {
            color: #CCC;
            font-family: monospace;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 10px;
            border-radius: 5px;
            height: 30px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }
        #fullscreen-btn {
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #fullscreen-btn svg {
            width: 18px;
            height: 18px;
            fill: #CCC;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        #fullscreen-btn:active {
            background: rgba(0, 0, 0, 0.9);
        }
        #top-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 20;
        }
        #start-audio-btn {
            height: 30px;
            padding: 0 14px;
            background: rgba(0, 0, 0, 0.5);
            color: #ccc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-family: monospace;
            transition: background 0.2s, opacity 0.3s;
        }
        #start-audio-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        #start-audio-btn.subtle {
            opacity: 0.6;
        }
        #start-audio-btn.subtle:hover {
            opacity: 1;
        }
        #key-hint {
            position: absolute;
            top: 50px;
            left: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            font-size: 11px;
            line-height: 1.6;
            pointer-events: none;
            transition: opacity 2s;
        }
    </style>
</head>
<body>
<script src="https://dev.giannihorst.ch/global.js"></script>
<script type="module" src="/main.js"></script>
<div id="top-bar">
    <div id="fps">FPS: 0</div>
    <button id="fullscreen-btn" aria-label="Toggle fullscreen">
        <svg id="fs-enter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        <svg id="fs-exit" style="display:none" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>
    <button id="start-audio-btn">Start Audio</button>
</div>
<div id="helloBackground" class="hide">
    <div id="helloContainer">
        <h1>Loading sounds...</h1>
    </div>
</div>
<div id="audio-panel" class="hide">
    <div id="audioContainer">
        <div id="mainButtons">
            <button id="randomMusicBtn">&#127922;</button>
            <div>
                Reverb: <input id="reverb-amount" type="range" min="-60" max="12" step="1" value="6" class="mainSliders">
            </div>
            <div>
                Hall: <input id="algo-reverb" type="range" min="-60" max="12" step="1" value="0" class="mainSliders">
            </div>
            <div>
                Dry: <input id="dry-volume" type="range" min="-60" max="12" step="1" value="0" class="mainSliders">
            </div>
            <div>
                Keys: <input id="oneshot-volume" type="range" min="-60" max="12" step="1" value="-6" class="mainSliders">
            </div>
            <canvas id="meter" width="200" height="12" style="border-radius:3px; margin-top:4px;"></canvas>
        </div>
        <div id="audio-sliders-container" class="many-sliders-container"></div>
    </div>
</div>
<div id="key-hint">
    Press keys to control:<br>
    Q expand / W collapse / E zero-g / R hyper-g / T scatter / Y dense<br>
    U bloom / I fog / O spin / P exposure / 1-0 effects<br>
    A-G force matrix / H warp / J-L force matrix / Z-M sound shaping
</div>
</body>
</html>
