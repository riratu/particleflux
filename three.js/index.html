<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50,000 Points with Physics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div id="fps">FPS: 0</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    let lastTime = performance.now();
    let frames = 0;
    const fpsDisplay = document.getElementById('fps');

    const repulsionRange = 5;
    const particleSize = 4
    const count = 5000;
    const repulsionStrength = 5000.2;
    const particles = [];
    const center = new THREE.Vector2(0, 0);
    const maxDistance = 500;
    const maxSpeed = 500;
    const damping = 0.9;
    const gravity = 1000;


    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let mouseButtonsClicked = [];



    let spatialGrid = new Map();

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX - window.innerWidth / 2;
        mouseY = window.innerHeight - e.clientY - window.innerHeight / 2;
    });

    window.oncontextmenu = function ()
    {
        return false;     // cancel default menu
    }

    addEventListener("mousedown", (event) => {
        console.log(event)
        mouseButtonsClicked[event.button] = true
    })


    addEventListener("mouseup", (event) => {
        console.log(event)
        mouseButtonsClicked[event.button] = false
    })

    for (let i = 0; i < count; i++) {
        particles.push({
            position: new THREE.Vector2((Math.random() - 0.5) * window.innerWidth, (Math.random() - 0.5) * window.innerHeight),
            velocity: new THREE.Vector2((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10),
            life: Math.random(),
            size: particleSize
        });
    }

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        positions[i * 3] = particles[i].position.x;
        positions[i * 3 + 1] = particles[i].position.y;
        positions[i * 3 + 2] = 0;

        colors[i * 3] = particles[i].life;
        colors[i * 3 + 1] = 0.5 + particles[i].life * 0.5;
        colors[i * 3 + 2] = 1 - particles[i].life;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ size: particleSize, vertexColors: true });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    camera.position.z = 500;

    function getGridKey(x, y) {
        const gridX = Math.floor(x / repulsionRange);
        const gridY = Math.floor(y / repulsionRange);
        return `${gridX},${gridY}`;
    }

    function buildSpatialGrid() {
        spatialGrid.clear();
        for (let i = 0; i < count; i++) {
            const key = getGridKey(particles[i].position.x, particles[i].position.y);
            if (!spatialGrid.has(key)) {
                spatialGrid.set(key, []);
            }
            spatialGrid.get(key).push(i);
        }
    }

    function getNearbyCells(x, y) {
        const searchCells = [];
        const gridX = Math.floor(x / repulsionRange);
        const gridY = Math.floor(y / repulsionRange);
        const searchRadius = 1;

        for (let dx = -searchRadius; dx <= searchRadius; dx++) {
            for (let dy = -searchRadius; dy <= searchRadius; dy++) {
                const key = `${gridX + dx},${gridY + dy}`;
                if (spatialGrid.has(key)) {
                    searchCells.push(key);
                }
            }
        }
        return searchCells;
    }

    function particleInteractions(deltaTime) {
        let comparisons = 0;
        const futureTime = deltaTime * 0.3;

        for (let i = 0; i < count; i++) {
            const p = particles[i];
            const futureX = p.position.x + p.velocity.x * futureTime;
            const futureY = p.position.y + p.velocity.y * futureTime;
            const nearbyCells = getNearbyCells(futureX, futureY);

            for (const cellKey of nearbyCells) {
                const cell = spatialGrid.get(cellKey);
                if (!cell) debugger;

                cell.forEach(otherNo => {
                    comparisons++;
                    const other = particles[otherNo];
                    const dx = futureX - other.position.x;
                    const dy = futureY - other.position.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < repulsionRange && dist > 0) {
                        const dirX = dx / dist;
                        const dirY = dy / dist;
                        const force = repulsionStrength * Math.pow(1 - dist / repulsionRange, 2) * 0.5 * deltaTime;
                        p.velocity.x += dirX * force;
                        p.velocity.y += dirY * force;
                        other.velocity.x -= dirX * force;
                        other.velocity.y -= dirY * force;
                    }
                });
            }
        }
        //console.log(comparisons);
    }

    function updatePhysics(deltaTime) {
        const posAttr = geometry.getAttribute('position');
        const colAttr = geometry.getAttribute('color');
        const pos = posAttr.array;
        const col = colAttr.array;

        for (let i = 0; i < count; i++) {
            const p = particles[i];

            p.position.x += p.velocity.x * deltaTime;
            p.position.y += p.velocity.y * deltaTime;

            // Gravity
            const dx = center.x - p.position.x;
            const dy = center.y - p.position.y;
            const distToCenter = Math.sqrt(dx * dx + dy * dy);

            if (distToCenter > 10) {
                const normalizedDist = Math.min(distToCenter / maxDistance, 1);
                const dirX = dx / distToCenter;
                const dirY = dy / distToCenter;
                p.velocity.x += dirX * deltaTime * gravity;
                p.velocity.y += dirY * deltaTime * gravity;
            }

            //Mouse Positive
            if(mouseButtonsClicked[0]) {
                const strength = 50000;
                const dmx = mouseX - p.position.x;
                const dmy = mouseY - p.position.y;

                //if (distToMouse > 10) {
                    //const dirX = dmx / distToMouse;
                    //const dirY = dmy / distToMouse;
                    p.velocity.x += dmx * deltaTime * strength;
                    p.velocity.y += dmy * deltaTime * strength;
                //}
            }

            // Mouse Negative
            if(mouseButtonsClicked[2]) {
                const strength = 500000;
                const dmx = mouseX - p.position.x;
                const dmy = mouseY - p.position.y;

                //if (distToMouse > 10) {
                //const dirX = dmx / distToMouse;
                //const dirY = dmy / distToMouse;
                p.velocity.x -= dmx * deltaTime * strength;
                p.velocity.y -= dmy * deltaTime * strength;
                //}
            }

            p.velocity.multiplyScalar(damping);

            const speed = p.velocity.length();
            if (speed > maxSpeed) {
                p.velocity.normalize().multiplyScalar(maxSpeed);
            }

            if(mouseButtonsClicked[1]) {
                p.life -= deltaTime * 0.01;

                if (p.life <= 0) {
                    p.position.set(
                        mouseX + Math.random() * 20,
                        mouseY + Math.random() * 20
                    );
                    p.velocity.set(
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 2
                    );
                    p.life = 1;
                }
            }
        }

        buildSpatialGrid();
        particleInteractions(deltaTime);

        for (let i = 0; i < count; i++) {
            pos[i * 3] = particles[i].position.x;
            pos[i * 3 + 1] = particles[i].position.y;

            col[i * 3] = particles[i].life;
            col[i * 3 + 1] = 0.5 + particles[i].life * 0.5;
            col[i * 3 + 2] = 1 - particles[i].life;
        }

        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;
    }

    let lastFrameTime = performance.now();

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const deltaTime = (now - lastFrameTime) / 1000;
        lastFrameTime = now;

        updatePhysics(deltaTime);
        renderer.render(scene, camera);

        frames++;
        if (now >= lastTime + 1000) {
            fpsDisplay.textContent = `FPS: ${frames}`;
            frames = 0;
            lastTime = now;
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
