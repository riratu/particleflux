<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dance</title>
    <style>
         body {
             margin: 0;
             overflow: hidden;
             background: #000;
         }
        canvas {
            display: block;
        }
        #fps {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #CCC;
            font-family: monospace;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        #fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #fullscreen-btn svg {
            width: 24px;
            height: 24px;
            fill: #CCC;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        #fullscreen-btn:active {
            background: rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>
<script src="https://dev.giannihorst.ch/global.js"></script>
<script type="module" src="/main.js"></script>
<div id="fps">FPS: 0</div>
<button id="fullscreen-btn" aria-label="Toggle fullscreen">
    <svg id="fs-enter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    <svg id="fs-exit" style="display:none" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
</button>
</body>
</html>
